<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="dark" />
  <title>{{ app_name or "StudyFlow" }}</title>

  <!-- Prevent white flash -->
  <style>
    html { background:#070b14; color-scheme:dark; }
    body { margin:0; background:#070b14; }
  </style>

  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>

<div id="dopamineHit" style="
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  padding:14px 20px;
  border-radius:16px;
  background:rgba(120,200,200,.15);
  border:1px solid rgba(120,200,200,.35);
  font-weight:900;
  font-size:16px;
  opacity:0;
  pointer-events:none;
  transition:all .25s ease;
  z-index:9999;
">
  +1 Progress
</div>

<script>
function dopamineHit(text = "+1 Progress") {
  const el = document.getElementById("dopamineHit");
  if (!el) return;

  el.textContent = text;

  el.style.opacity = "1";
  el.style.transform = "translateX(-50%) translateY(0px)";

  setTimeout(() => {
    el.style.opacity = "0";
    el.style.transform = "translateX(-50%) translateY(-20px)";
  }, 900);
}
</script>

<body>
  <div class="app" id="appRoot">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="side-top">
        <div class="brand-card">
          <div class="brand-left">
            <div class="brand-icon" aria-hidden="true">
              <img src="{{ url_for('static', filename='logo.png') }}" alt="StudyFlow">
            </div>
            <div class="brand-meta">
              <div class="brand-name">{{ app_name or "StudyFlow" }}</div>
              <div class="brand-tag">Focus • Plan • Execute</div>
            </div>
          </div>

          <button class="icon-btn" id="collapseBtn" type="button" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link {% if request.path.startswith('/today') %}active{% endif %}" href="{{ url_for('today') }}">
            <span class="nav-ico">T</span><span class="nav-text">Today</span>
          </a>
          <a class="nav-link {% if request.path.startswith('/inputs') %}active{% endif %}" href="{{ url_for('inputs') }}">
            <span class="nav-ico">I</span><span class="nav-text">Inputs</span>
          </a>
          <a class="nav-link {% if request.path.startswith('/resources') %}active{% endif %}" href="{{ url_for('resources') }}">
            <span class="nav-ico">R</span><span class="nav-text">Resources</span>
          </a>
         <a class="nav-link {% if request.path.startswith('/active-recall') %}active{% endif %}" href="{{ url_for('active_recall') }}">
  <span class="nav-ico">P</span><span class="nav-text">Practice</span>
</a>
          <a class="nav-link {% if request.path.startswith('/settings') %}active{% endif %}" href="{{ url_for('settings_page') }}">
            <span class="nav-ico">S</span><span class="nav-text">Settings</span>
          </a>
        </nav>
      </div>

      <div class="side-bottom">
        <div class="divider"></div>
        <a class="nav-link danger" href="{{ url_for('logout') }}">
          <span class="nav-ico">⎋</span><span class="nav-text">Logout</span>
        </a>
        <div class="tip">Built for focus.</div>
      </div>
    </aside>

    <main class="main">
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    (function(){
      const root = document.getElementById("appRoot");
      const btn = document.getElementById("collapseBtn");
      const key = "studyflow_sidebar_collapsed";

      function apply(){
        const on = localStorage.getItem(key) === "1";
        root.classList.toggle("is-collapsed", on);
      }

      btn.addEventListener("click", () => {
        const next = !(localStorage.getItem(key) === "1");
        localStorage.setItem(key, next ? "1" : "0");
        apply();
      });

      apply();
    })();
  </script>
</body>
</html>

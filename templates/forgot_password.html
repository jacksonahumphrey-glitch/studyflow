<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>StudyFlow — Reset Password</title>

  <style>
    html{ background:#070b14; color-scheme:dark; }
    body{ margin:0; background:#070b14; }
  </style>

  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">

  <style>
    body.auth{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(1200px 600px at 35% 25%, rgba(70,120,255,.18), transparent 60%),
        radial-gradient(900px 600px at 65% 40%, rgba(60,210,255,.10), transparent 55%),
        #070b14;
    }

    body.auth .center{
      width:100%;
      display:grid;
      place-items:center;
      padding:36px 18px;
    }

    body.auth .auth-wrap{
      width:min(820px, 96vw);
    }

    body.auth .card-inner{
      padding:28px 28px 22px;
    }

    body.auth .brand{
      display:flex !important;
      align-items:center !important;
      justify-content:space-between !important;
      gap:18px !important;
      width:100%;
    }

    body.auth .brand > div{
      text-align:left !important;
      flex:1 1 auto;
      min-width:0;
    }

    body.auth .brand h1{
      letter-spacing:-0.02em;
    }

    body.auth .logo-box{
      flex:0 0 230px;
      min-width:230px;
      height:92px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(20,28,45,.92), rgba(18,24,38,.82));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 8px 20px rgba(0,0,0,.16);
      overflow:hidden;
      position:relative;
    }

    body.auth .logo-box::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, rgba(90,220,255,.10), transparent 55%);
      pointer-events:none;
    }

    body.auth .logo-box img{
      width:74px;
      height:74px;
      object-fit:contain;
      display:block;
      position:relative;
      z-index:1;
      filter:
        drop-shadow(0 0 10px rgba(90,220,255,.14))
        drop-shadow(0 0 20px rgba(90,220,255,.08));
      mix-blend-mode:screen;
    }

    body.auth .alert{
      margin:14px 0 16px;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(255,85,105,.35);
      background:rgba(255,55,85,.12);
      color:#ffd7df;
    }
  </style>
</head>

<body class="auth">
  <div class="center">
    <div class="auth-wrap">
      <div class="card">
        <div class="card-inner">

          <div class="brand">
            <div>
              <h1>StudyFlow</h1>
              <div class="sub">Reset your password</div>
            </div>

            <div class="logo-box">
              <img src="{{ url_for('static', filename='logo.png') }}" alt="StudyFlow logo">
            </div>
          </div>

          {% if error %}
            <div class="alert">{{ error }}</div>
          {% endif %}

          <form class="form" method="post" action="{{ url_for('forgot_password') }}">
            <div class="field">
              <div class="label">Email</div>
              <input class="input" type="email" name="email" placeholder="you@example.com" required>
            </div>

            <button class="btn" type="submit">Send 4-digit code</button>

            <div class="helper">
              <a href="{{ url_for('login') }}">Back to login</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</body>
</html>

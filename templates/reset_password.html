<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="color-scheme" content="dark"/>
<title>StudyFlow — Reset Password</title>

<style>
html{background:#070b14;color-scheme:dark;}
body{margin:0;background:#070b14;}
</style>

<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">

<style>
body.auth{
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:#e8efff;
  background:
    radial-gradient(1200px 600px at 35% 25%, rgba(70,120,255,.18), transparent 60%),
    radial-gradient(900px 600px at 65% 40%, rgba(60,210,255,.10), transparent 55%),
    #070b14;
}

.center{
  width:100%;
  display:grid;
  place-items:center;
  padding:36px 18px;
}

.auth-wrap{
  width:min(820px,96vw);
}

.card{
  border-radius:24px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);
  box-shadow:0 24px 80px rgba(0,0,0,.55);
  overflow:hidden;
}

.card-inner{
  padding:26px;
}

/* HEADER */
.auth-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:22px;
  padding:22px 24px;
  border-radius:26px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 14px 34px rgba(0,0,0,.18);
  margin-bottom:18px;
}

.left-title{
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1 1 auto;
  min-width:0;
}

.left-title h1{
  margin:0;
  font-size:60px;
  font-weight:900;
  letter-spacing:-0.02em;
  line-height:.95;
}

.left-title .sub{
  font-size:20px;
  color:rgba(232,239,255,.70);
  font-weight:650;
}

.logo-box{
  flex:0 0 250px;
  min-width:250px;
  height:96px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(20,28,45,.92), rgba(18,24,38,.82));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 8px 20px rgba(0,0,0,.16);
  overflow:hidden;
  position:relative;
}

.logo-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(90,220,255,.12), transparent 58%);
  pointer-events:none;
}

.logo-box img{
  width:82px;
  height:82px;
  object-fit:contain;
  display:block;
  position:relative;
  z-index:1;
  filter:
    drop-shadow(0 0 10px rgba(90,220,255,.16))
    drop-shadow(0 0 22px rgba(90,220,255,.10));
  mix-blend-mode:screen;
}

/* ALERTS */
.alert{
  margin:14px 0;
  padding:14px 16px;
  border-radius:14px;
  width:100%;
  box-sizing:border-box;
}

.alert.error{
  border:1px solid rgba(255,85,105,.35);
  background:rgba(255,55,85,.12);
  color:#ffd7df;
}

.alert.success{
  border:1px solid rgba(80,220,170,.45) !important;
  background:rgba(80,220,170,.14) !important;
  color:rgba(210,255,240,.98) !important;
  box-shadow:0 0 12px rgba(80,220,170,.15);
}

/* FORM */
.form{
  display:grid;
  gap:14px;
}

.label{
  font-size:18px;
  color:rgba(232,239,255,.78);
  font-weight:650;
}

.input{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.24);
  color:#e8efff;
  outline:none;
  box-sizing:border-box;
}

.btn{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(130,170,255,.30);
  background:linear-gradient(180deg, rgba(80,140,255,.22), rgba(40,90,170,.18));
  color:#e8efff;
  font-weight:800;
  cursor:pointer;
  margin-top:6px;
}

.helper{
  margin-top:12px;
  font-size:16px;
  color:rgba(232,239,255,.65);
}

.helper a{
  color:rgba(140,190,255,.95);
  text-decoration:none;
}

.helper a:hover{
  text-decoration:underline;
}
</style>
</head>

<body class="auth">
<div class="center">
<div class="auth-wrap">
<div class="card">
<div class="card-inner">

<div class="auth-top">
  <div class="left-title">
    <h1>StudyFlow</h1>
    <div class="sub">Enter code + new password</div>
  </div>

  <div class="logo-box">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="StudyFlow logo">
  </div>
</div>

{% if error %}
<div class="alert error">{{ error }}</div>
{% endif %}

{% if info %}
<div class="alert success">{{ info }}</div>
{% endif %}

<form class="form" method="post">
  <div>
    <div class="label">Email</div>
    <input class="input" type="email" name="email" value="{{ email or '' }}" required>
  </div>

  <div>
    <div class="label">4-digit code</div>
    <input class="input" type="text" name="code" maxlength="4" pattern="[0-9]{4}" required>
  </div>

  <div>
    <div class="label">New password</div>
    <input class="input" type="password" name="password" required>
  </div>

  <button class="btn" type="submit">Reset password</button>

  <div class="helper">
    <a href="{{ url_for('forgot_password') }}">Send code again</a><br>
    <a href="{{ url_for('login') }}">Back to login</a>
  </div>
</form>

</div>
</div>
</div>
</div>
</body>
</html>
